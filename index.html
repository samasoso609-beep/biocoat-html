<script>
const i18n = {
    ar: {
        title: "نظام مقارنة البدائل الحيوية",
        subtitle: "حلل ثمارك واحصل على مسارين مختلفين للحفظ مع كامل التفاصيل لكل مادة.",
        camBtn: "التحليل البصري",
        uploadBtn: "رفع صورة العينة",
        analyzeBtn: "توليد المسارين (أساسي + بديل)",
        detected: "العينة المكتشفة",
        shelfLife: "إطالة العمر الافتراضي",
        componentsTitle: "المكونات والتركيزات الدقيقة",
        stepsTitle: "بروتوكول التحضير الخاص",
        devLabel: "المطور الرئيسي للنظام",
        loading: "جاري مقارنة المسارات العلمية...",
        days: "يوم إضافي"
    },
    en: {
        title: "Bio-Alternative System",
        subtitle: "Analyze your fruits and get two distinct preservation paths with full details.",
        camBtn: "Visual Analysis",
        uploadBtn: "Upload Sample",
        analyzeBtn: "Generate Dual Paths (Primary + Alt)",
        detected: "Detected Sample",
        shelfLife: "Shelf Life Extension",
        componentsTitle: "Ingredients & Exact Concentrations",
        stepsTitle: "Specific Preparation Protocol",
        devLabel: "Chief System Developer",
        loading: "Comparing scientific paths...",
        days: "Extra Days"
    }
};

let currentLang = "ar";
let currentImg = null;
let globalData = null;
let activePath = "primary";

/* ========== LANGUAGE ========== */
function toggleLang() {
    currentLang = currentLang === "ar" ? "en" : "ar";
    document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";

    document.getElementById("langToggle").textContent =
        currentLang === "ar" ? "English" : "عربي";

    document.querySelectorAll("[data-i18n]").forEach(el => {
        el.textContent = i18n[currentLang][el.getAttribute("data-i18n")];
    });

    if (globalData) renderContent();
}

/* ========== CAMERA ========== */
async function openCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        document.getElementById("cameraVideo").srcObject = stream;
        window.localStream = stream;

        document.getElementById("inputOptions").classList.add("hidden");
        document.getElementById("cameraContainer").classList.remove("hidden");

    } catch (e) {
        alert("Camera error");
    }
}

/* ========== CAPTURE ========== */
function capturePhoto() {
    const video = document.getElementById("cameraVideo");
    const canvas = document.getElementById("cameraCanvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext("2d").drawImage(video, 0, 0);

    const url = canvas.toDataURL("image/jpeg");
    currentImg = url.split(",")[1];

    document.getElementById("previewImg").src = url;

    if (window.localStream) {
        window.localStream.getTracks().forEach(t => t.stop());
    }

    document.getElementById("cameraContainer").classList.add("hidden");
    document.getElementById("previewContainer").classList.remove("hidden");
}

/* ========== FILE UPLOAD ========== */
document.getElementById("fileUpload").onchange = e => {
    const reader = new FileReader();

    reader.onload = ev => {
        currentImg = ev.target.result.split(",")[1];
        document.getElementById("previewImg").src = ev.target.result;

        document.getElementById("inputOptions").classList.add("hidden");
        document.getElementById("previewContainer").classList.remove("hidden");
    };

    reader.readAsDataURL(e.target.files[0]);
};

/* ========== PROCESS IMAGE ========== */
async function processImage() {
    document.getElementById("loader").classList.remove("hidden");

    const apiKey = ""; // حطي API KEY هنا

    const prompt = `
Identify fruit and return JSON with TWO coating formulas:
Primary and Alternative.
`;

    try {
        const resp = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: prompt },
                            {
                                inlineData: {
                                    mimeType: "image/jpeg",
                                    data: currentImg
                                }
                            }
                        ]
                    }]
                })
            }
        );

        const res = await resp.json();
        globalData = JSON.parse(res.candidates[0].content.parts[0].text);

        activePath = "primary";

        renderContent();

        document.getElementById("previewContainer").classList.add("hidden");
        document.getElementById("resultsContainer").classList.remove("hidden");

    } catch (e) {
        alert("Analysis error");
    }

    document.getElementById("loader").classList.add("hidden");
}

/* ========== SWITCH PATH ========== */
function switchPath(path) {
    activePath = path;

    document.getElementById("tabPrimary").className =
        path === "primary" ? "tab-active" : "tab-inactive";

    document.getElementById("tabAlternative").className =
        path === "alt" ? "tab-active" : "tab-inactive";

    renderContent();
}

/* ========== RENDER ========== */
function renderContent() {
    if (!globalData) return;

    const isAr = currentLang === "ar";
    const current = globalData[activePath];

    document.getElementById("resFruit").textContent =
        isAr ? globalData.fruit_ar : globalData.fruit_en;

    document.getElementById("resShelfLife").textContent =
        "+" + globalData.days + " " + (isAr ? "يوم" : "Days");

    document.getElementById("labelPrimary").textContent =
        isAr ? globalData.primary.name_ar : globalData.primary.name_en;

    document.getElementById("labelAlt").textContent =
        isAr ? globalData.alt.name_ar : globalData.alt.name_en;

    const components = isAr ? current.components_ar : current.components_en;

    document.getElementById("resComponents").innerHTML =
        components.map(c => `
        <div class="flex justify-between p-4 bg-slate-50 rounded-2xl border">
            <span>${c}</span>
        </div>
    `).join("");

    const steps = isAr ? current.steps_ar : current.steps_en;

    document.getElementById("resSteps").innerHTML =
        steps.map((s, i) => `
        <div class="flex gap-4">
            <div>${i + 1}</div>
            <p>${s}</p>
        </div>
    `).join("");

    document.getElementById("resRationale").textContent =
        isAr ? current.rationale_ar : "";
}
</script>
