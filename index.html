<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioCoat Pro | نظام البدائل المتطور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; }
        .tab-active { background-color: #10b981 !important; color: white !important; border-color: #059669 !important; transform: scale(1.05); }
        .tab-inactive { background-color: white; color: #64748b; border-color: #e2e8f0; }
        .formulation-card { transition: all 0.4s ease; }
        .gradient-green { background: linear-gradient(135deg, #065f46 0%, #059669 100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="gradient-green text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-flask-vial text-2xl text-emerald-300"></i>
                <h1 class="text-xl font-black">BioCoat Pro <span class="text-emerald-200 font-light">Dual-Path</span></h1>
            </div>
            <button id="langToggle" onclick="toggleLang()" class="text-xs font-bold bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full border border-white/20 transition">English</button>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-5xl">
        
        <!-- Welcome Section -->
        <div id="welcomeSection" class="text-center mb-10">
            <h2 class="text-3xl font-black text-slate-900 mb-3" data-i18n="title">نظام مقارنة البدائل الحيوية</h2>
            <p class="text-slate-600" data-i18n="subtitle">حلل ثمارك واحصل على مسارين مختلفين للحفظ مع كامل التفاصيل لكل مادة.</p>
        </div>

        <!-- Input Section -->
        <div id="inputOptions" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <button onclick="openCamera()" class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 hover:border-emerald-500 transition-all group text-right">
                <i class="fa-solid fa-camera-retro text-3xl text-emerald-600 mb-4 group-hover:scale-110 transition-transform"></i>
                <h3 class="font-bold text-lg" data-i18n="camBtn">التحليل البصري</h3>
            </button>
            <label class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 hover:border-emerald-500 transition-all group text-right cursor-pointer">
                <i class="fa-solid fa-cloud-arrow-up text-3xl text-blue-600 mb-4 group-hover:scale-110 transition-transform"></i>
                <h3 class="font-bold text-lg" data-i18n="uploadBtn">رفع صورة العينة</h3>
                <input type="file" id="fileUpload" class="hidden" accept="image/*">
            </label>
        </div>

        <!-- Hidden Viewports -->
        <div id="cameraContainer" class="hidden max-w-md mx-auto mb-10 rounded-3xl overflow-hidden shadow-2xl relative bg-black">
            <video id="cameraVideo" class="w-full h-[450px] object-cover" autoplay playsinline></video>
            <button onclick="capturePhoto()" class="absolute bottom-6 left-1/2 -translate-x-1/2 w-16 h-16 bg-white rounded-full border-4 border-emerald-500 shadow-xl"></button>
        </div>
        <canvas id="cameraCanvas" class="hidden"></canvas>

        <div id="previewContainer" class="hidden max-w-xl mx-auto mb-10">
            <div class="bg-white p-5 rounded-[2.5rem] shadow-xl border border-slate-100">
                <img id="previewImg" class="w-full h-72 object-contain rounded-2xl bg-slate-50 mb-6" src="">
                <button onclick="processImage()" class="w-full gradient-green text-white py-5 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 hover:opacity-90 transition shadow-lg shadow-emerald-200">
                    <i class="fa-solid fa-microscope"></i> <span data-i18n="analyzeBtn">توليد المسارين (أساسي + بديل)</span>
                </button>
            </div>
        </div>

        <!-- DUAL RESULTS SECTION -->
        <div id="resultsContainer" class="hidden space-y-8 pb-20 animate-fade-in">
            
            <!-- Result Header: Fruit Type & Shelf Life -->
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest" data-i18n="detected">العينة المكتشفة</span>
                    <h3 id="resFruit" class="text-3xl font-black text-slate-800"></h3>
                </div>
                <div class="flex items-center gap-4 bg-emerald-50 px-6 py-4 rounded-2xl">
                    <div class="text-right">
                        <span class="text-emerald-800 font-bold block text-sm" data-i18n="shelfLife">إطالة العمر الافتراضي</span>
                        <span id="resShelfLife" class="text-2xl font-black text-emerald-600"></span>
                    </div>
                    <i class="fa-solid fa-clock-rotate-left text-3xl text-emerald-500"></i>
                </div>
            </div>

            <!-- THE TOGGLE TABS (The Switch) -->
            <div class="flex p-1.5 bg-slate-200/50 rounded-2xl max-w-md mx-auto">
                <button id="tabPrimary" onclick="switchPath('primary')" class="flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all duration-300 tab-active">
                    <i class="fa-solid fa-star mb-1 block"></i> <span id="labelPrimary"></span>
                </button>
                <button id="tabAlternative" onclick="switchPath('alt')" class="flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all duration-300 tab-inactive">
                    <i class="fa-solid fa-shuffle mb-1 block"></i> <span id="labelAlt"></span>
                </button>
            </div>

            <!-- Dynamic Content Area -->
            <div id="dynamicContent" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Ingredients & Concentrations -->
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h4 class="text-xl font-black mb-6 flex items-center gap-3">
                        <i class="fa-solid fa-scale-balanced text-emerald-500"></i>
                        <span data-i18n="componentsTitle">المكونات والتركيزات الدقيقة</span>
                    </h4>
                    <div id="resComponents" class="space-y-3"></div>
                </div>

                <!-- Industrial Steps -->
                <div class="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-emerald-500"></div>
                    <h4 class="text-xl font-black mb-6 flex items-center gap-3">
                        <i class="fa-solid fa-list-ol text-emerald-400"></i>
                        <span data-i18n="stepsTitle">بروتوكول التحضير الخاص</span>
                    </h4>
                    <div id="resSteps" class="space-y-5"></div>
                </div>
            </div>

            <!-- Scientific Rationale -->
            <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100">
                <p id="resRationale" class="text-blue-900 text-center font-medium italic"></p>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-100 py-8 text-center">
        <p class="text-slate-400 text-xs mb-1" data-i18n="devLabel">المطور الرئيسي للنظام</p>
        <p class="text-slate-800 font-black" data-i18n="userName">[ضع اسمك هنا]</p>
    </footer>

    <!-- Loader -->
    <div id="loader" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center hidden">
        <div class="text-center">
            <div class="w-20 h-20 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-6 mx-auto"></div>
            <p class="text-white text-xl font-black" data-i18n="loading">جاري مقارنة المسارات العلمية...</p>
        </div>
    </div>

    <script>
    const i18n = {
        ar: {
            title: "نظام مقارنة البدائل الحيوية", subtitle: "حلل ثمارك واحصل على مسارين مختلفين للحفظ مع كامل التفاصيل لكل مادة.",
            camBtn: "التحليل البصري", uploadBtn: "رفع صورة العينة", analyzeBtn: "توليد المسارين (أساسي + بديل)",
            detected: "العينة المكتشفة", shelfLife: "إطالة العمر الافتراضي", componentsTitle: "المكونات والتركيزات الدقيقة",
            stepsTitle: "بروتوكول التحضير الخاص", devLabel: "المطور الرئيسي للنظام", loading: "جاري مقارنة المسارات العلمية...",
            days: "يوم إضافي"
        },
        en: {
            title: "Bio-Alternative System", subtitle: "Analyze your fruits and get two distinct preservation paths with full details.",
            camBtn: "Visual Analysis", uploadBtn: "Upload Sample", analyzeBtn: "Generate Dual Paths (Primary + Alt)",
            detected: "Detected Sample", shelfLife: "Shelf Life Extension", componentsTitle: "Ingredients & Exact Concentrations",
            stepsTitle: "Specific Preparation Protocol", devLabel: "Chief System Developer", loading: "Comparing scientific paths...",
            days: "Extra Days"
        }
    };

    let currentLang = 'ar';
    let currentImg = null;
    let globalData = null;
    let activePath = 'primary';

    function toggleLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'English' : 'عربي';

        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.textContent = i18n[currentLang][el.getAttribute('data-i18n')];
        });

        if (globalData) renderContent();
    }

    async function openCamera() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('cameraVideo').srcObject = s;
            window.localStream = s;

            document.getElementById('inputOptions').classList.add('hidden');
            document.getElementById('cameraContainer').classList.remove('hidden');
        } catch (e) {
            alert("Camera error");
        }
    }

    function capturePhoto() {
        const v = document.getElementById('cameraVideo');
        const c = document.getElementById('cameraCanvas');

        c.width = v.videoWidth;
        c.height = v.videoHeight;

        c.getContext('2d').drawImage(v, 0, 0);

        const url = c.toDataURL('image/jpeg');
        currentImg = url.split(',')[1];

        document.getElementById('previewImg').src = url;

        if (window.localStream) window.localStream.getTracks().forEach(t => t.stop());

        document.getElementById('cameraContainer').classList.add('hidden');
        document.getElementById('previewContainer').classList.remove('hidden');
    }

    document.getElementById('fileUpload').onchange = e => {
        const r = new FileReader();

        r.onload = ev => {
            currentImg = ev.target.result.split(',')[1];
            document.getElementById('previewImg').src = ev.target.result;

            document.getElementById('inputOptions').classList.add('hidden');
            document.getElementById('previewContainer').classList.remove('hidden');
        };

        r.readAsDataURL(e.target.files[0]);
    };

    async function processImage() {
        document.getElementById('loader').classList.remove('hidden');

        const prompt = `Identify fruit. Provide TWO distinct edible coating formulations: one Primary and one Alternative.`;

        try {
            const resp = await fetch("/api/analyze", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    image: currentImg,
                    prompt: prompt
                })
            });

            const res = await resp.json();

            globalData = JSON.parse(res.candidates[0].content.parts[0].text);
            activePath = 'primary';

            renderContent();

            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('resultsContainer').classList.remove('hidden');

        } catch (e) {
            alert("Analysis error");
        }

        document.getElementById('loader').classList.add('hidden');
    }

    function switchPath(path) {
        activePath = path;

        document.getElementById('tabPrimary').className =
            path === 'primary' ? 'flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all tab-active'
                : 'flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all tab-inactive';

        document.getElementById('tabAlternative').className =
            path === 'alt' ? 'flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all tab-active'
                : 'flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all tab-inactive';

        renderContent();
    }

    function renderContent() {
        if (!globalData) return;

        const isAr = currentLang === 'ar';

        document.getElementById('resFruit').textContent =
            isAr ? globalData.fruit_ar : globalData.fruit_en;

        document.getElementById('resShelfLife').textContent =
            "+" + globalData.days + " " + (isAr ? "يوم" : "Days");

        document.getElementById('labelPrimary').textContent =
            isAr ? globalData.primary.name_ar : globalData.primary.name_en;

        document.getElementById('labelAlt').textContent =
            isAr ? globalData.alt.name_ar : globalData.alt.name_en;

        const current = activePath === 'primary' ? globalData.primary : globalData.alt;

        const components = isAr ? current.components_ar : current.components_en;
        document.getElementById('resComponents').innerHTML = components.map(c => `
            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <span class="font-bold text-slate-700">${c}</span>
                <i class="fa-solid fa-check-circle text-emerald-500"></i>
            </div>
        `).join('');

        const steps = isAr ? current.steps_ar : current.steps_en;
        document.getElementById('resSteps').innerHTML = steps.map((s, i) => `
            <div class="flex gap-4 items-start">
                <div class="w-8 h-8 rounded-lg bg-emerald-500/20 text-emerald-400 font-black flex items-center justify-center shrink-0 text-xs">${i + 1}</div>
                <p class="text-slate-300 text-sm leading-relaxed">${s}</p>
            </div>
        `).join('');

        document.getElementById('resRationale').textContent =
            isAr ? current.rationale_ar : "";
    }
</script>
</body>
</html>
